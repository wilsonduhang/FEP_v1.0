name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Test & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and verify with quality gates
        # CI runs the default Maven profile (no -P). The fep-transport
        # module's tongtech/ sources and com.tongtech:* SDK dependencies are
        # excluded by default (see fep-transport/pom.xml <profile id="tongtech">).
        # The tongtech provider integration is verified locally via
        # `./mvnw verify -P tongtech` after running scripts/install-tlq-sdk.sh.
        # GHA runners do not have the TongLINK/Q SDK and must not require it.
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/'
          retention-days: 7

      - name: Upload Checkstyle reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: '**/target/checkstyle-result.xml'
          retention-days: 7

      - name: Upload SpotBugs reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: '**/target/spotbugsXml.xml'
          retention-days: 7

      - name: Upload surefire test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7
