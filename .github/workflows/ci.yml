name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Test & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and verify with quality gates
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/'
          retention-days: 7

      - name: Upload Checkstyle reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: '**/target/checkstyle-result.xml'
          retention-days: 7

      - name: Upload SpotBugs reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: '**/target/spotbugsXml.xml'
          retention-days: 7

      - name: Upload surefire test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  pr-size-check:
    name: PR Size Check (<=400 lines)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count changed lines
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          ADDED=$(git diff --numstat "$BASE_SHA" "$HEAD_SHA" -- ':!*.md' ':!*.xml' ':!pom.xml' | awk '{s+=$1} END {print s+0}')
          echo "Added lines (excluding *.md, *.xml, pom.xml): $ADDED"
          if [ "$ADDED" -gt 400 ]; then
            echo "::error::PR adds $ADDED lines of code, exceeding the 400-line limit. Please split this PR."
            exit 1
          fi
          echo "PR size OK: $ADDED lines added"
