# SonarCloud 项目配置
sonar.projectKey=wilsonduhang_FEP_v1.0
sonar.organization=wilsonduhang

sonar.projectName=FEP 综合前置平台
sonar.projectVersion=1.0.0-SNAPSHOT

# 源码路径
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=17
sonar.java.target=17

# 覆盖率报告（聚合所有模块）
sonar.coverage.jacoco.xmlReportPaths=\
  fep-common/target/site/jacoco/jacoco.xml,\
  fep-security-api/target/site/jacoco/jacoco.xml,\
  fep-security-mock/target/site/jacoco/jacoco.xml,\
  fep-transport/target/site/jacoco/jacoco.xml,\
  fep-converter/target/site/jacoco/jacoco.xml,\
  fep-processor/target/site/jacoco/jacoco.xml,\
  fep-collector/target/site/jacoco/jacoco.xml,\
  fep-web/target/site/jacoco/jacoco.xml

# SpotBugs 报告
sonar.java.spotbugs.reportPaths=\
  fep-common/target/spotbugsXml.xml,\
  fep-security-api/target/spotbugsXml.xml,\
  fep-security-mock/target/spotbugsXml.xml,\
  fep-transport/target/spotbugsXml.xml,\
  fep-converter/target/spotbugsXml.xml,\
  fep-processor/target/spotbugsXml.xml,\
  fep-collector/target/spotbugsXml.xml,\
  fep-web/target/spotbugsXml.xml

# Checkstyle 报告
sonar.java.checkstyle.reportPaths=\
  fep-common/target/checkstyle-result.xml,\
  fep-security-api/target/checkstyle-result.xml,\
  fep-security-mock/target/checkstyle-result.xml,\
  fep-transport/target/checkstyle-result.xml,\
  fep-converter/target/checkstyle-result.xml,\
  fep-processor/target/checkstyle-result.xml,\
  fep-collector/target/checkstyle-result.xml,\
  fep-web/target/checkstyle-result.xml

# 排除生成代码/配置类
sonar.exclusions=**/FepApplication.java,**/*AutoConfiguration.java,**/SecurityApiConfiguration.java,**/SecurityMockConfiguration.java

# 质量门禁（Sonar Way 标准）
sonar.qualitygate.wait=true
