# 生产环境配置
# - MySQL 8.x
# - 配置通过环境变量/Nacos 注入

spring:
  datasource:
    url: ${FEP_DB_URL:jdbc:mysql://localhost:3306/fep?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${FEP_DB_USERNAME}
    password: ${FEP_DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false

# Redis (生产环境)
fep:
  redis:
    enabled: true
  jwt:
    secret: ${FEP_JWT_SECRET}
    access-token-ttl-seconds: 7200
    refresh-token-ttl-seconds: 604800
    issuer: fep
spring:
  data:
    redis:
      host: ${FEP_REDIS_HOST:localhost}
      port: ${FEP_REDIS_PORT:6379}
      password: ${FEP_REDIS_PASSWORD:}
      database: ${FEP_REDIS_DATABASE:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms

logging:
  level:
    com.puchain.fep: INFO
