# 生产环境配置
# - MySQL 8.x
# - 配置通过环境变量/Nacos 注入

spring:
  datasource:
    url: ${FEP_DB_URL:jdbc:mysql://localhost:3306/fep?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${FEP_DB_USERNAME}
    password: ${FEP_DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
  flyway:
    # P3a T1: MySQL-only appends db/migration-mysql for the V19_1
    # row-count-guard trigger (DELIMITER // + SIGNAL SQLSTATE). The
    # trigger lives in a SIBLING directory because Flyway 10.x recursively
    # scans every classpath: location and a child path db/migration/mysql/
    # would be picked up by H2 dev/test (which lists only
    # classpath:db/migration) and fail on DELIMITER syntax. The {vendor}
    # placeholder is NOT a substitute: Flyway identifies H2 as vendor
    # "H2" regardless of MODE=MySQL, so it cannot route MySQL-only SQL
    # away from the H2 classpath. Common path restated here so the
    # additional location is appended in prod only.
    locations: classpath:db/migration,classpath:db/migration-mysql
  data:
    redis:
      host: ${FEP_REDIS_HOST:localhost}
      port: ${FEP_REDIS_PORT:6379}
      password: ${FEP_REDIS_PASSWORD:}
      database: ${FEP_REDIS_DATABASE:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms

# Redis (生产环境)
fep:
  cors:
    allowed-origins: ${FEP_CORS_ALLOWED_ORIGINS}
  redis:
    enabled: true
  jwt:
    secret: ${FEP_JWT_SECRET}
    access-token-ttl-seconds: 7200
    refresh-token-ttl-seconds: 604800
    issuer: fep
  callback:
    credential:
      migration:
        # 回调凭证 legacy 明文迁移：标记哪些 keyId 的凭证密文实为明文（SM4 加密引入前存量）。
        # 默认空（见 CallbackLegacyCredentialKeyIdProperties）；impl 模式若有存量明文凭证待迁移，
        # 在此显式列出真实旧 keyId（真实 keyId 语义同密钥，按需部署期填，不入 repo）。
        # active-key-id（fep.security.sm4.active-key-id）禁与本集合交集（C1 启动守护）。
        legacy-plaintext-key-ids: []
  # 国密真实实现（S1 SM4 + S2a SM3/SM2 登录 + S2b 报文签验）。⚠️ R7/[R2-1]：provider: impl 下
  # 公钥分发/登录解密（S2a）+ 报文签名私钥 getSignPrivateKey（S2b，经 MessageSignPort）均已实装。
  # provider cutover（取消下行注释）启用国密真实实现；报文签验额外受 prod-gate R3 约束 ——
  # 启用 msg-sign / peer-verify-keys / verify-inbound 前须甲方 Q1 答复或 muzhou 书面接受软密钥风险
  #（ADR 2026-06-12 形态 C-演进式：MessageSignPort + 进程内 BC 先行 + 1818 适配缝）。
  security:
    # provider: impl
    # GM S2b 入站验签开关（fep-web 域 @Value，默认 false 放行）。prod cutover 时开，prod-gate R3
    #（须先配置下方 sm2.peer-verify-keys；mock provider 下开启也恒过、不提供完整性保证）。
    # verify-inbound: true
    sm4:
      active-key-id: ${FEP_SM4_ACTIVE_KEY_ID:sm4-cred-v1}
      sm4-keys:
        # hex 编码 16 字节 SM4 密钥，部署期经环境变量/sealed store 注入（密码设备生成），永不入 repo
        sm4-cred-v1: ${FEP_SM4_KEY_V1}
    sm2:                                        # GM S2a：SM2 登录密钥（真实值部署期 env 注入，永不入 repo）
      login-active-key-id: ${FEP_SM2_LOGIN_ACTIVE_KEY_ID:sm2-login-v1}
      login-keys:
        sm2-login-v1:                           # map key 须字面值（YAML key 不解析 ${} 占位符），轮换时新增字面 key
          private-key-hex: ${FEP_SM2_LOGIN_PRIVATE_KEY_HEX}   # 32 字节标量 d（hex 64 字符）
          public-key-hex: ${FEP_SM2_LOGIN_PUBLIC_KEY_HEX}     # 04||x||y 65 字节（hex 130 字符）
      # GM S5：SM2 审计签名密钥（审计 hash 链行签名，架构 §1219）。
      # ⚠️ provider=impl 时必须同时配置本段，否则操作日志行将静默写失败
      #（AuditChainWriter 启动期 WARN 告警，Plan 抉择⑪）。
      # ⚠️ 审计 hash 链 = 单写者/单实例部署前提（AuditChainWriter synchronized；
      #   多实例需先引入分布式链尾协调，归未来项）。
      audit-active-key-id: ${FEP_SM2_AUDIT_ACTIVE_KEY_ID:sm2-audit-v1}
      audit-keys:
        sm2-audit-v1:                           # map key 须字面值，轮换时新增字面 key（历史行验签按 sign_key_id 路由）
          private-key-hex: ${FEP_SM2_AUDIT_PRIVATE_KEY_HEX}   # 32 字节标量 d（hex 64 字符）
          public-key-hex: ${FEP_SM2_AUDIT_PUBLIC_KEY_HEX}     # 04||x||y 65 字节（hex 130 字符）
      # GM S2b：报文签名密钥（本节点出站加签）+ 对端验签公钥（入站按 SrcNode 路由）。
      # ⚠️ prod-gate R3：报文签验默认关闭——以下两段 + 上方 verify-inbound 须在甲方 Q1 答复 /
      #   muzhou 书面接受软密钥风险后方可启用；保持注释时 msg-sign 段缺失不阻断 provider=impl 启动
      #   （KeyServiceImpl 抉择④：未配置段跳过校验）。
      # msg-sign-active-key-id: ${FEP_SM2_MSGSIGN_ACTIVE_KEY_ID:sm2-msgsign-v1}
      # msg-sign-keys:
      #   sm2-msgsign-v1:                         # map key 须字面值，轮换时新增字面 key
      #     private-key-hex: ${FEP_SM2_MSGSIGN_PRIVATE_KEY_HEX}  # 32 字节标量 d（hex 64 字符）
      #     public-key-hex: ${FEP_SM2_MSGSIGN_PUBLIC_KEY_HEX}    # 04||x||y 65 字节（hex 130 字符）
      # peer-verify-keys:                         # SrcNode → 对端验签公钥列表（list 抗轮换 try-each）
      #   A1000143000104:                         # HNDEMP 中心节点（map key 字面值）
      #     - ${FEP_SM2_PEER_HNDEMP_PUBLIC_KEY_HEX}              # 当前公钥
      #     # - ${FEP_SM2_PEER_HNDEMP_PUBLIC_KEY_HEX_PREV}      # 换证期保留旧公钥（try-each）

# 显式启用 Prometheus metrics 导出（生产）。基础 application.yml 仅配置 endpoint exposure，
# 此处显式置 enabled=true 确保 request-state / outbound / callback gauge 与 counter 被
# PrometheusMeterRegistry 采集导出（红线 springboot3_metrics_export_enabled；S2 T5 santa MINOR）。
management:
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.puchain.fep: INFO
