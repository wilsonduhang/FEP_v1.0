# 生产环境配置
# - MySQL 8.x
# - 配置通过环境变量/Nacos 注入

spring:
  datasource:
    url: ${FEP_DB_URL:jdbc:mysql://localhost:3306/fep?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${FEP_DB_USERNAME}
    password: ${FEP_DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
  flyway:
    # P3a T1: MySQL-only appends db/migration-mysql for the V19_1
    # row-count-guard trigger (DELIMITER // + SIGNAL SQLSTATE). The
    # trigger lives in a SIBLING directory because Flyway 10.x recursively
    # scans every classpath: location and a child path db/migration/mysql/
    # would be picked up by H2 dev/test (which lists only
    # classpath:db/migration) and fail on DELIMITER syntax. The {vendor}
    # placeholder is NOT a substitute: Flyway identifies H2 as vendor
    # "H2" regardless of MODE=MySQL, so it cannot route MySQL-only SQL
    # away from the H2 classpath. Common path restated here so the
    # additional location is appended in prod only.
    locations: classpath:db/migration,classpath:db/migration-mysql
  data:
    redis:
      host: ${FEP_REDIS_HOST:localhost}
      port: ${FEP_REDIS_PORT:6379}
      password: ${FEP_REDIS_PASSWORD:}
      database: ${FEP_REDIS_DATABASE:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms

# Redis (生产环境)
fep:
  cors:
    allowed-origins: ${FEP_CORS_ALLOWED_ORIGINS}
  redis:
    enabled: true
  jwt:
    secret: ${FEP_JWT_SECRET}
    access-token-ttl-seconds: 7200
    refresh-token-ttl-seconds: 604800
    issuer: fep
  # 国密真实实现（S1）。⚠️ R7/[R2-1]：provider: impl 翻转全 KeyService → SM2 方法
  # （AuthController 公钥分发 / LoginVerifier 登录解密 / OutboundSignAdapter 出站报文签名）
  # 抛 UnsupportedOperationException，prod 出站签名+登录崩溃。故 S1 保持注释；
  # prod cutover（取消下行注释）GATED ON S2（SM2 实现后方可启用）。
  security:
    # provider: impl
    sm4:
      active-key-id: ${FEP_SM4_ACTIVE_KEY_ID:sm4-cred-v1}
      sm4-keys:
        # hex 编码 16 字节 SM4 密钥，部署期经环境变量/sealed store 注入（密码设备生成），永不入 repo
        sm4-cred-v1: ${FEP_SM4_KEY_V1}

# 显式启用 Prometheus metrics 导出（生产）。基础 application.yml 仅配置 endpoint exposure，
# 此处显式置 enabled=true 确保 request-state / outbound / callback gauge 与 counter 被
# PrometheusMeterRegistry 采集导出（红线 springboot3_metrics_export_enabled；S2 T5 santa MINOR）。
management:
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.puchain.fep: INFO
