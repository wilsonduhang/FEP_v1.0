# 生产环境配置
# - MySQL 8.x
# - 配置通过环境变量/Nacos 注入

spring:
  datasource:
    url: ${FEP_DB_URL:jdbc:mysql://localhost:3306/fep?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${FEP_DB_USERNAME}
    password: ${FEP_DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false

logging:
  level:
    com.puchain.fep: INFO
