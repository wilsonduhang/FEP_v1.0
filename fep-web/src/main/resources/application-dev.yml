# 开发环境配置
# - H2 嵌入式数据库（内存模式 + MySQL 兼容）
# - 安全模块使用 Mock 实现
# - 日志级别 DEBUG

spring:
  datasource:
    url: jdbc:h2:mem:fep;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.puchain.fep: DEBUG
    org.hibernate.SQL: DEBUG
