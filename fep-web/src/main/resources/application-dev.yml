# 开发环境配置
# - H2 嵌入式数据库（内存模式 + MySQL 兼容）
# - 安全模块使用 Mock 实现
# - Redis 自动配置禁用（开发环境不依赖外部 Redis）
# - 日志级别 DEBUG

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: jdbc:h2:mem:fep;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# Redis (开发环境，需本地启动 Redis 并设置 fep.redis.enabled=true)
# fep:
#   redis:
#     enabled: true
# spring:
#   data:
#     redis:
#       host: localhost
#       port: 6379
#       database: 0

fep:
  cors:
    allowed-origins: http://localhost:*,http://127.0.0.1:*
  jwt:
    secret: ZGV2LWRldi1kZXYtZGV2LWRldi1kZXYtZGV2LWRldi1kZXYtZGV2LWRldi0xMg==
    access-token-ttl-seconds: 7200
    refresh-token-ttl-seconds: 604800
    issuer: fep-dev

logging:
  level:
    com.puchain.fep: DEBUG
    org.hibernate.SQL: DEBUG
