spring:
  application:
    name: fep
  profiles:
    active: dev
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    # Common location (V1-V18 + V19/V20 dialect-agnostic). MySQL-only
    # files (e.g. V19_1 trigger) live in the SIBLING directory
    # db/migration-mysql and are wired in via application-prod.yml.
    # H2 dev/test profiles deliberately exclude that location.
    # Why a sibling instead of a child of db/migration? Flyway 10.x
    # recursively scans every classpath: location, so db/migration/mysql/
    # would be loaded here too and H2 would fail on DELIMITER syntax.
    # The {vendor} placeholder is NOT an alternative: Flyway identifies
    # H2 as vendor "H2" regardless of MODE=MySQL, so it cannot route
    # MySQL-only SQL away from the H2 classpath.
    # D8 row-count invariant on H2 is enforced at the Service layer
    # via Assert.state(count == 88) — see T5.
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        # P5 T8: 添加 prometheus 端点暴露用于 outbound 发送指标
        # (FR-MSG-OUTBOUND-METRICS, PRD v1.3 §8.6)
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    distribution:
      # P5 T8 AC2: 让 Micrometer 客户端为 fep_outbound_send_latency_seconds
      # 计算 p50/p95/p99 quantile 并以
      # fep_outbound_send_latency_seconds{quantile="0.5|0.95|0.99"} 行暴露给 Prometheus。
      # 客户端 percentile 不支持跨实例聚合，单机 FEP 部署足以覆盖。
      percentiles:
        fep_outbound_send_latency_seconds: 0.5,0.95,0.99
        fep_callback_send_latency_seconds: 0.5,0.95,0.99

logging:
  level:
    com.puchain.fep: INFO

# P6a.2 下载任务配置
fep:
  # §5.8 业务校验规则母本（mode C，权威源=《接口报文规范 V2.0.0》逐条引用，非臆造）
  # 规则内容由领域规范定义，引擎启动期装配；未配置的报文类型业务关默认放行。
  validation:
    rules:
      # R1：报文 1001 业务大类 MainClass 枚举校验
      # 源：§5.1.3 表 5.1.3-1 业务类别代码规范（10 大类，p199）+ §3.1.1.2 RealHead1001 MainClass(M* 枚举型)
      # XSD 仅约束 Token minLength=2/maxLength=16（DataType.xsd 不强制枚举成员），故由引擎补足
      "1001":
        - type: ENUM
          field: MainClass
          allowed: [EAST, COINFO, COAUTH, GYL, MONITOR, STATS, YWTB, ZFJS, SYSTEM, GENERAL]
        # R2：报文 1001 业务小类 SecondClass 依赖枚举（合法集随大类 MainClass 变）
        # 源：§5.1.3 表 5.1.3-1 业务类别代码规范（p199）；SecondClass XSD 为 Token 不约束枚举（DataType.xsd），引擎补足
        # GENERAL 大类小类自由定义（Token 2..8），故 allowedByKey 省略 GENERAL → 不约束
        - type: DEPENDENT_ENUM
          field: SecondClass
          keyField: MainClass
          allowedByKey:
            EAST: [V50]
            COINFO: [I1001, PKG01]
            COAUTH: [A0001, A0002, PKG01]
            GYL: [HX01, HX02, HX03, HX04, PT01, PT02, PT03, BB01, BB02]
            MONITOR: [ZHJC01, ZTJC01]
            STATS: [LSD01, GYL01]
            YWTB: [ZHYW]
            ZFJS: [FZBMD]
            SYSTEM: [I0001]
      # ===== GROUP_COOCCURRENCE 母本（报文规范 §2.1.3.1 分组可选字段，全规范仅 4 组；Plan Batch2 Task 6）=====
      # G1：通用报文头文件传输三字段组（表 2.2.2.2-1 p8，脚注 9-11"携带文件传输时必填"）
      # muzhou 拍板注册全 44 报文（"[*]" 通配；bracket key 防 relaxed binding 剥 *，Plan 决策 6）
      # scope: HEAD —— 1102/2102/2103/1104 body 有同名 FileName（历史已报送文件名），限 HEAD 子树防误拒（Plan 决策 5）
      "[*]":
        - type: GROUP_COOCCURRENCE
          groupFields: [FileName, FileContentHash, FileSize]
          scope: HEAD
      # G3(3000)：电子凭证信息 pzInfo 凭证签名组（表 3.3.13.2-10 p111；共享结构 DataType.xsd pzInfo）
      "3000":
        - type: GROUP_COOCCURRENCE
          groupFields: [SignElement, klzrfSign]
        # ApplyMode：表 5.1.7-22 凭证登记业务分类（p204；Plan Batch2 Task 10）
        - type: ENUM
          field: ApplyMode
          allowed: ["1", "2"]
      # G2(3004)：融资风险比例参考 + 额度更新时间（表 3.3.8.2-3 p84；RiskRate 为 XML 容器，按元素存在判定）
      # G3(3004)：同 3000 pzInfo 凭证签名组
      "3004":
        - type: GROUP_COOCCURRENCE
          groupFields: [RiskRate, edUpdateDateTime]
        - type: GROUP_COOCCURRENCE
          groupFields: [SignElement, klzrfSign]
        # Result（业务处理结果）：表 5.1.2-3 处理结果代码表全 52 码（p197-199；Plan 决策 4 统一取值域）
        - type: ENUM
          field: Result
          allowed: ["90000", "90001", "90500", "21001", "21002", "21003", "21004", "21005",
                    "91005", "92001", "92002", "92003", "92004", "92005", "92006", "93001",
                    "93002", "93003", "93004", "93999", "94001", "94002", "94003", "94004",
                    "94005", "94006", "94007", "95001", "95002", "95003", "95004", "95005",
