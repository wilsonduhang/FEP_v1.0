                    "95014", "95015", "95016", "95099", "28001", "28002", "28003", "28004",
                    "98001", "19001", "29002", "29999"]
        # rzPhaseCode：表 5.1.7-3 业务进度码·凭证融资段（p201；Plan Batch2 Task 10）
        - type: ENUM
          field: rzPhaseCode
